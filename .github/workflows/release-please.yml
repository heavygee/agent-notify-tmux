name: Release Please

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          release-type: node

  build:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Run tests
        run: bun run test:ci

      - name: Scan secrets before publish
        run: bun run scan:secrets

      - name: Build x64
        run: bun build --compile --minify --sourcemap --target=bun-linux-x64 src/index.ts --outfile dist/agent-notify-x64

      - name: Build arm64
        run: bun build --compile --minify --sourcemap --target=bun-linux-arm64 src/index.ts --outfile dist/agent-notify-arm64

      - name: Compress binaries
        run: |
          cd dist
          tar -czvf agent-notify-linux-x64.tar.gz agent-notify-x64
          tar -czvf agent-notify-linux-arm64.tar.gz agent-notify-arm64

      - name: Smoke test release artifacts
        run: |
          mkdir -p /tmp/agent-notify-smoke
          cd dist
          tar -xzf agent-notify-linux-x64.tar.gz -C /tmp/agent-notify-smoke
          code=0
          if ! timeout 5 /tmp/agent-notify-smoke/agent-notify-x64 >/tmp/agent-notify-smoke/smoke.log 2>&1; then
            code=$?
          fi
          if [ "$code" -ne 124 ]; then
            cat /tmp/agent-notify-smoke/smoke.log
            exit "$code"
          fi
          grep -q "Select language / 选择语言" /tmp/agent-notify-smoke/smoke.log

      - name: Upload Release Assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.release-please.outputs.tag_name }}
          files: |
            dist/agent-notify-linux-x64.tar.gz
            dist/agent-notify-linux-arm64.tar.gz
